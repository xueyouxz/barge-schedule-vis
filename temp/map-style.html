<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自定义风格地图 - MapLibre GL JS</title>

  <!-- MapLibre GL JS (开源免费) -->
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      z-index: 10;
    }
    .header h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header .badge {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(167,139,250,0.3);
      color: #a78bfa;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Map Container ── */
    #map {
      flex: 1;
      width: 100%;
    }

    /* ── Style Switcher Panel ── */
    .style-panel {
      position: absolute;
      top: 72px;
      right: 16px;
      z-index: 10;
      background: rgba(15, 15, 26, 0.92);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px;
      width: 220px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .style-panel h3 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #888;
      margin-bottom: 12px;
    }
    .style-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 6px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Noto Sans SC', sans-serif;
    }
    .style-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(96,165,250,0.3);
    }
    .style-btn.active {
      background: rgba(96,165,250,0.12);
      border-color: rgba(96,165,250,0.5);
      color: #60a5fa;
    }
    .style-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Info Toast ── */
    .info-toast {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(15,15,26,0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 12px;
      color: #999;
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      gap: 16px;
    }
    .info-toast span { color: #60a5fa; }

    /* ── Custom MapLibre Controls ── */
    .maplibregl-ctrl-group {
      background: rgba(15,15,26,0.9) !important;
      border: 1px solid rgba(255,255,255,0.08) !important;
      border-radius: 8px !important;
      overflow: hidden;
    }
    .maplibregl-ctrl-group button {
      background: transparent !important;
      border-color: rgba(255,255,255,0.06) !important;
    }
    .maplibregl-ctrl-group button:hover {
      background: rgba(255,255,255,0.08) !important;
    }
    .maplibregl-ctrl-group button .maplibregl-ctrl-icon {
      filter: invert(1) brightness(0.7);
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Custom Map Studio</h1>
    <div class="badge">MapLibre GL + OSM · 开源免费</div>
  </div>

  <div id="map"></div>

  <!-- 样式切换面板 -->
  <div class="style-panel">
    <h3>地图风格</h3>
    <button class="style-btn active" onclick="applyStyle('cyberpunk', event)">
      <div class="style-dot" style="background: linear-gradient(135deg, #0a0a2e, #60a5fa);"></div>
      赛博朋克
    </button>
    <button class="style-btn" onclick="applyStyle('ink', event)">
      <div class="style-dot" style="background: linear-gradient(135deg, #f5f0e8, #3a3a3a);"></div>
      水墨素雅
    </button>
    <button class="style-btn" onclick="applyStyle('forest', event)">
      <div class="style-dot" style="background: linear-gradient(135deg, #1a2e1a, #4ade80);"></div>
      森林绿野
    </button>
    <button class="style-btn" onclick="applyStyle('sunset', event)">
      <div class="style-dot" style="background: linear-gradient(135deg, #2e1a1a, #f97316);"></div>
      落日暖橘
    </button>
  </div>

  <!-- 底部信息 -->
  <div class="info-toast">
    <div>数据 <span>OpenStreetMap</span></div>
    <div>渲染 <span>MapLibre GL JS</span></div>
    <div>瓦片 <span>OpenFreeMap</span></div>
  </div>

<script>
// ═══════════════════════════════════════════════════════
//  核心：自定义 Style JSON（MapLibre Style Specification）
//  所有视觉定制都在这里完成，无需服务端
// ═══════════════════════════════════════════════════════

// OpenFreeMap 免费矢量瓦片源（无需 API Key，完全免费）
const TILE_SOURCE = {
  "openmaptiles": {
    type: "vector",
    url: "https://tiles.openfreemap.org/planet"
  }
};

// ── 颜色主题定义 ──
const THEMES = {
  cyberpunk: {
    bg:         "#0a0a2e",
    water:      "#0c1445",
    waterLine:  "#1e3a8a",
    land:       "#0f0f2d",
    green:      "#0a1a2e",
    building:   "#1a1a4e",
    buildEdge:  "#2a2a6e",
    roadMain:   "#3b82f6",
    roadMinor:  "#1e3a6e",
    roadCase:   "#0a0a3e",
    label:      "#93c5fd",
    labelHalo:  "#0a0a2e",
    boundary:   "#6366f1",
    rail:       "#4338ca",
  },
  ink: {
    bg:         "#f5f0e8",
    water:      "#d4cfc4",
    waterLine:  "#bbb5a8",
    land:       "#f5f0e8",
    green:      "#e8e3d8",
    building:   "#ddd8cc",
    buildEdge:  "#ccc7bb",
    roadMain:   "#6b6560",
    roadMinor:  "#c5bfb5",
    roadCase:   "#f5f0e8",
    label:      "#4a4540",
    labelHalo:  "#f5f0e8",
    boundary:   "#9a9590",
    rail:       "#8a8580",
  },
  forest: {
    bg:         "#0f1f0f",
    water:      "#0a2a2a",
    waterLine:  "#0d4a4a",
    land:       "#0f1f0f",
    green:      "#1a3a1a",
    building:   "#1a2e1a",
    buildEdge:  "#2a4a2a",
    roadMain:   "#4ade80",
    roadMinor:  "#1a3e2a",
    roadCase:   "#0a1a0a",
    label:      "#86efac",
    labelHalo:  "#0f1f0f",
    boundary:   "#22c55e",
    rail:       "#15803d",
  },
  sunset: {
    bg:         "#1f1210",
    water:      "#2a1a15",
    waterLine:  "#5a3020",
    land:       "#1f1210",
    green:      "#2a1f10",
    building:   "#2e1a12",
    buildEdge:  "#4a2a18",
    roadMain:   "#f97316",
    roadMinor:  "#5a3020",
    roadCase:   "#1a0e0a",
    label:      "#fdba74",
    labelHalo:  "#1f1210",
    boundary:   "#ea580c",
    rail:       "#c2410c",
  }
};

// ── 根据主题生成完整 Style JSON ──
function buildStyle(themeName) {
  const t = THEMES[themeName];

  return {
    version: 8,
    name: `custom-${themeName}`,
    sources: TILE_SOURCE,
    // 可选：自定义字体（使用 OpenMapTiles 默认字体集）
    glyphs: "https://tiles.openfreemap.org/fonts/{fontstack}/{range}.pbf",
    layers: [
      // ── 1. 背景 ──
      {
        id: "background",
        type: "background",
        paint: { "background-color": t.bg }
      },

      // ── 2. 水域填充 ──
      {
        id: "water",
        type: "fill",
        source: "openmaptiles",
        "source-layer": "water",
        paint: {
          "fill-color": t.water,
          "fill-opacity": 0.9
        }
      },

      // ── 3. 水域轮廓 ──
      {
        id: "water-outline",
        type: "line",
        source: "openmaptiles",
        "source-layer": "water",
        paint: {
          "line-color": t.waterLine,
          "line-width": 1
        }
      },

      // ── 4. 绿地 / 公园 ──
      {
        id: "landcover-green",
        type: "fill",
        source: "openmaptiles",
        "source-layer": "landcover",
        filter: ["==", "class", "grass"],
        paint: {
          "fill-color": t.green,
          "fill-opacity": 0.6
        }
      },
      {
        id: "park",
        type: "fill",
        source: "openmaptiles",
        "source-layer": "park",
        paint: {
          "fill-color": t.green,
          "fill-opacity": 0.5
        }
      },

      // ── 5. 建筑 ──
      {
        id: "building",
        type: "fill",
        source: "openmaptiles",
        "source-layer": "building",
        minzoom: 13,
        paint: {
          "fill-color": t.building,
          "fill-opacity": ["interpolate", ["linear"], ["zoom"], 13, 0, 15, 0.7]
        }
      },
      {
        id: "building-outline",
        type: "line",
        source: "openmaptiles",
        "source-layer": "building",
        minzoom: 14,
        paint: {
          "line-color": t.buildEdge,
          "line-width": 0.5,
          "line-opacity": ["interpolate", ["linear"], ["zoom"], 14, 0, 16, 0.6]
        }
      },

      // ── 6. 道路 - 外壳（用于道路边框效果） ──
      {
        id: "road-case",
        type: "line",
        source: "openmaptiles",
        "source-layer": "transportation",
        filter: ["in", "class", "motorway", "trunk", "primary", "secondary"],
        layout: {
          "line-join": "round",
          "line-cap": "round"
        },
        paint: {
          "line-color": t.roadCase,
          "line-width": ["interpolate", ["exponential", 1.5], ["zoom"],
            5, 1, 10, 4, 16, 20
          ],
          "line-opacity": 0.4
        }
      },

      // ── 7. 道路 - 次要道路 ──
      {
        id: "road-minor",
        type: "line",
        source: "openmaptiles",
        "source-layer": "transportation",
        filter: ["in", "class", "minor", "service", "street"],
        minzoom: 12,
        layout: {
          "line-join": "round",
          "line-cap": "round"
        },
        paint: {
          "line-color": t.roadMinor,
          "line-width": ["interpolate", ["exponential", 1.5], ["zoom"],
            12, 0.5, 16, 4
          ],
          "line-opacity": ["interpolate", ["linear"], ["zoom"], 12, 0, 14, 0.7]
        }
      },

      // ── 8. 道路 - 主要道路 ──
      {
        id: "road-main",
        type: "line",
        source: "openmaptiles",
        "source-layer": "transportation",
        filter: ["in", "class", "motorway", "trunk", "primary", "secondary"],
        layout: {
          "line-join": "round",
          "line-cap": "round"
        },
        paint: {
          "line-color": t.roadMain,
          "line-width": ["interpolate", ["exponential", 1.5], ["zoom"],
            5, 0.5, 10, 2, 16, 12
          ],
          "line-opacity": ["interpolate", ["linear"], ["zoom"], 5, 0.3, 8, 0.8]
        }
      },

      // ── 9. 铁路 ──
      {
        id: "railway",
        type: "line",
        source: "openmaptiles",
        "source-layer": "transportation",
        filter: ["==", "class", "rail"],
        paint: {
          "line-color": t.rail,
          "line-width": 1.5,
          "line-dasharray": [3, 3],
          "line-opacity": 0.5
        }
      },

      // ── 10. 行政边界 ──
      {
        id: "boundary",
        type: "line",
        source: "openmaptiles",
        "source-layer": "boundary",
        filter: ["<=", "admin_level", 4],
        paint: {
          "line-color": t.boundary,
          "line-width": ["interpolate", ["linear"], ["zoom"], 2, 0.5, 10, 2],
          "line-dasharray": [4, 2],
          "line-opacity": 0.6
        }
      },

      // ── 11. 地名标注 ──
      {
        id: "place-label",
        type: "symbol",
        source: "openmaptiles",
        "source-layer": "place",
        filter: ["in", "class", "city", "town"],
        layout: {
          "text-field": "{name}",
          "text-font": ["Open Sans Regular"],
          "text-size": ["interpolate", ["linear"], ["zoom"],
            4, 10, 8, 14, 12, 18
          ],
          "text-anchor": "center",
          "text-max-width": 8
        },
        paint: {
          "text-color": t.label,
          "text-halo-color": t.labelHalo,
          "text-halo-width": 1.5,
          "text-halo-blur": 0.5
        }
      },

      // ── 12. 道路标注 ──
      {
        id: "road-label",
        type: "symbol",
        source: "openmaptiles",
        "source-layer": "transportation_name",
        minzoom: 13,
        layout: {
          "text-field": "{name}",
          "text-font": ["Open Sans Regular"],
          "text-size": 11,
          "symbol-placement": "line",
          "text-rotation-alignment": "map"
        },
        paint: {
          "text-color": t.label,
          "text-halo-color": t.labelHalo,
          "text-halo-width": 1,
          "text-opacity": 0.7
        }
      }
    ]
  };
}

// ═══════════════════════════════════════════════════════
//  初始化地图
// ═══════════════════════════════════════════════════════

var map = new maplibregl.Map({
  container: "map",
  style: buildStyle("cyberpunk"),
  center: [116.39, 39.91],   // 北京
  zoom: 11,
  attributionControl: false
});

// 添加缩放控件
map.addControl(new maplibregl.NavigationControl(), "bottom-right");

// 添加版权信息
map.addControl(new maplibregl.AttributionControl({
  compact: true,
  customAttribution: '© <a href="https://openstreetmap.org">OSM</a> · <a href="https://openfreemap.org">OpenFreeMap</a>'
}), "bottom-left");

// ═══════════════════════════════════════════════════════
//  主题切换
// ═══════════════════════════════════════════════════════

function applyStyle(themeName, e) {
  // 地图未初始化时直接返回
  if (!map) return;

  // 记住当前视角
  const center = map.getCenter();
  const zoom = map.getZoom();
  const bearing = map.getBearing();
  const pitch = map.getPitch();

  // 应用新样式
  map.setStyle(buildStyle(themeName));

  // 恢复视角
  map.once("styledata", () => {
    map.jumpTo({ center, zoom, bearing, pitch });
  });

  // 更新按钮状态
  document.querySelectorAll(".style-btn").forEach(btn => btn.classList.remove("active"));
  if (e && e.currentTarget) {
    e.currentTarget.classList.add("active");
  }

  // 更新 body 背景色以匹配
  document.body.style.background = THEMES[themeName].bg;
}
</script>

</body>
</html>
